services:
  - type: web
    name: stock-hunter
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main_cloud:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false          # nhập thủ công trong Render dashboard
      - key: TELEGRAM_CHAT_ID
        sync: false          # nhập thủ công trong Render dashboard
      - key: PORTFOLIO_FILE
        value: /tmp/portfolio.json
